<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>tweb</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
<style>
:root {
  --bg: #1e1e2e;
  --bg2: #181825;
  --surface: #313244;
  --overlay: #45475a;
  --text: #cdd6f4;
  --subtext: #a6adc8;
  --blue: #89b4fa;
  --red: #f38ba8;
  --green: #a6e3a1;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

#header {
  display: flex; align-items: center; background: var(--bg2);
  border-bottom: 1px solid var(--overlay); height: 36px; user-select: none;
}
#tab-bar {
  display: flex; flex: 1; overflow-x: auto; scrollbar-width: none;
}
#tab-bar::-webkit-scrollbar { display: none; }

.tab {
  display: flex; align-items: center; padding: 0 14px; height: 36px;
  cursor: pointer; border-right: 1px solid var(--surface); white-space: nowrap;
  font-size: 13px; color: var(--subtext); min-width: 100px; gap: 8px;
  transition: background 0.1s;
}
.tab:hover { background: var(--surface); }
.tab.active { background: var(--bg); color: var(--text); }
.tab .name { flex: 1; }
.tab .close {
  width: 18px; height: 18px; border-radius: 3px; display: flex;
  align-items: center; justify-content: center; font-size: 15px;
  opacity: 0; transition: opacity 0.1s; line-height: 1;
}
.tab:hover .close { opacity: 0.6; }
.tab .close:hover { opacity: 1; background: var(--red); color: var(--bg); }

#new-btn {
  width: 36px; height: 36px; display: flex; align-items: center;
  justify-content: center; cursor: pointer; color: var(--subtext);
  font-size: 20px; border: none; background: none; flex-shrink: 0;
}
#new-btn:hover { color: var(--text); background: var(--surface); }

#terminals { position: relative; height: calc(100vh - 36px); }
.term-wrap {
  position: absolute; inset: 0; display: none; padding: 4px;
}
.term-wrap.active { display: flex; }

.term-wrap .xterm { height: 100% !important; width: 100% !important; }
.term-wrap .xterm-viewport { height: 100% !important; }
.term-wrap .xterm-screen { height: 100% !important; }
</style>
</head>
<body>

<div id="header">
  <div id="tab-bar"></div>
  <button id="new-btn" onclick="createTab()" title="New terminal">+</button>
</div>
<div id="terminals"></div>

<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.js"></script>
<script>
'use strict';

const tabs = {};
let activeId = null;

async function init() {
  const res = await fetch('/api/terminals');
  const list = await res.json();
  if (list && list.length > 0) {
    list.forEach(t => setupTab(t.id, t.name));
    activateTab(list[0].id);
  } else {
    await createTab();
  }
}

async function createTab() {
  const res = await fetch('/api/terminals', { method: 'POST' });
  if (!res.ok) return;
  const info = await res.json();
  setupTab(info.id, info.name);
  activateTab(info.id);
}

function setupTab(id, name) {
  // Tab element
  const tabBar = document.getElementById('tab-bar');
  const tab = document.createElement('div');
  tab.className = 'tab';
  tab.innerHTML = `<span class="name">${name}</span><span class="close" onclick="closeTab('${id}',event)">×</span>`;
  tab.onclick = (e) => { if (!e.target.classList.contains('close')) activateTab(id); };
  tabBar.appendChild(tab);

  // Terminal wrapper
  const area = document.getElementById('terminals');
  const wrap = document.createElement('div');
  wrap.className = 'term-wrap';
  area.appendChild(wrap);

  // xterm.js
  const xterm = new Terminal({
    cursorBlink: true,
    fontSize: 14,
    fontFamily: "'JetBrains Mono','Fira Code','Cascadia Code',Menlo,Monaco,'Courier New',monospace",
    theme: {
      background: '#1e1e2e', foreground: '#cdd6f4', cursor: '#f5e0dc',
      selectionBackground: '#585b70',
      black: '#45475a', red: '#f38ba8', green: '#a6e3a1', yellow: '#f9e2af',
      blue: '#89b4fa', magenta: '#f5c2e7', cyan: '#94e2d5', white: '#bac2de',
      brightBlack: '#585b70', brightRed: '#f38ba8', brightGreen: '#a6e3a1',
      brightYellow: '#f9e2af', brightBlue: '#89b4fa', brightMagenta: '#f5c2e7',
      brightCyan: '#94e2d5', brightWhite: '#a6adc8',
    }
  });

  const fitAddon = new FitAddon.FitAddon();
  xterm.loadAddon(fitAddon);
  xterm.loadAddon(new WebLinksAddon.WebLinksAddon());
  xterm.open(wrap);
  fitAddon.fit();

  // WebSocket
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(`${proto}//${location.host}/ws/${id}`);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    const d = fitAddon.proposeDimensions();
    if (d) ws.send(JSON.stringify({ type: 'resize', cols: d.cols, rows: d.rows }));
  };

  ws.onmessage = (e) => {
    if (e.data instanceof ArrayBuffer) xterm.write(new Uint8Array(e.data));
  };

  ws.onclose = () => {
    xterm.write('\r\n\x1b[90m[session ended]\x1b[0m\r\n');
  };

  xterm.onData(data => {
    if (ws.readyState === WebSocket.OPEN) ws.send(new TextEncoder().encode(data));
  });

  // Resize handling
  const ro = new ResizeObserver(() => {
    fitAddon.fit();
    const d = fitAddon.proposeDimensions();
    if (d && ws.readyState === WebSocket.OPEN)
      ws.send(JSON.stringify({ type: 'resize', cols: d.cols, rows: d.rows }));
  });
  ro.observe(wrap);

  tabs[id] = { xterm, ws, fitAddon, wrap, tab, ro };
}

function activateTab(id) {
  if (activeId && tabs[activeId]) {
    tabs[activeId].tab.classList.remove('active');
    tabs[activeId].wrap.classList.remove('active');
  }
  activeId = id;
  const t = tabs[id];
  t.tab.classList.add('active');
  t.wrap.classList.add('active');
  // Delay fit until layout is complete after display change
  requestAnimationFrame(() => {
    t.fitAddon.fit();
    const d = t.fitAddon.proposeDimensions();
    if (d && t.ws.readyState === WebSocket.OPEN)
      t.ws.send(JSON.stringify({ type: 'resize', cols: d.cols, rows: d.rows }));
    t.xterm.focus();
  });
}

async function closeTab(id, event) {
  event.stopPropagation();
  const t = tabs[id];
  if (!t) return;

  fetch(`/api/terminals/${id}`, { method: 'DELETE' });
  t.ws.close();
  t.xterm.dispose();
  t.ro.disconnect();
  t.tab.remove();
  t.wrap.remove();
  delete tabs[id];

  const remaining = Object.keys(tabs);
  if (remaining.length > 0) {
    activateTab(remaining[remaining.length - 1]);
  } else {
    activeId = null;
    createTab();
  }
}

window.addEventListener('resize', () => {
  if (activeId && tabs[activeId]) {
    const t = tabs[activeId];
    t.fitAddon.fit();
    const d = t.fitAddon.proposeDimensions();
    if (d && t.ws.readyState === WebSocket.OPEN)
      t.ws.send(JSON.stringify({ type: 'resize', cols: d.cols, rows: d.rows }));
  }
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.ctrlKey && e.shiftKey && e.key === 'T') { e.preventDefault(); createTab(); }
  // Ctrl+Cmd+Shift+1/2/3 to switch to terminal by position
  if (e.ctrlKey && e.metaKey && e.shiftKey) {
    const digit = e.code.match(/^Digit([1-9])$/);
    if (digit) {
      e.preventDefault();
      const idx = parseInt(digit[1]) - 1;
      const ids = Object.keys(tabs);
      if (idx < ids.length) activateTab(ids[idx]);
    }
  }
});

init();
</script>
</body>
</html>
